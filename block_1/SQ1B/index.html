<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>294 - 01B</title>
  </head>
  <body>
    <h1>Hello JS</h1>

    <div>
      <button>Anne</button>
      <button>Bernd</button>
      <button>Cleo</button>
    </div>
    <h2 id="ausgabe"></h2>

    <script>
      function clickButton() {
        document.getElementById("ausgabe").innerHTML = event.target.textContent;
      }

      let buttons = document.getElementsByTagName("button");
      console.log(buttons);
      for (let i in buttons) {
        buttons[i].onclick = clickButton;
      }
    </script>
  </body>
</html>
